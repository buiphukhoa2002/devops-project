name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ── Build & push Docker images to Docker Hub ──────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/mern-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/mern-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to DigitalOcean droplet ────────────────────────────────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,monitoring/"
          target: "/opt/app"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: MONGO_URI,JWT_SECRET,EMAIL_USER,EMAIL_PASS,DOCKER_USERNAME,GRAFANA_ADMIN_PASSWORD
          script: |
            cd /opt/app

            # Write .env from environment variables passed by the action
            cat > .env <<EOF
            MONGO_URI=${MONGO_URI}
            JWT_SECRET=${JWT_SECRET}
            PORT=8001
            EMAIL_USER=${EMAIL_USER}
            EMAIL_PASS=${EMAIL_PASS}
            EMAIL_FROM=${EMAIL_USER}
            DOCKER_USERNAME=${DOCKER_USERNAME}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
            EOF

            # Pull latest images and restart services
            docker compose pull
            docker compose up -d --remove-orphans
